[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    # `unicode-ident` 1.0.24+ ships under "(MIT OR Apache-2.0) AND Unicode-3.0";
    # the Unicode-3.0 license is OSI-approved and permissive (Unicode
    # Consortium). Same post-figlet fix carried forward. rusty-autossh ships
    # no bundled assets, so no Artistic clauses needed.
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]

[bans]
multiple-versions = "warn"

[advisories]
version = 2
yanked = "deny"
